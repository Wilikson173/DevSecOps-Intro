apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: juice-shop-netpol
  namespace: juice-shop
spec:
  podSelector:
    matchLabels:
      app: juice-shop
  policyTypes:
    - Ingress
    - Egress

  ingress:
    # Allow traffic only from pods in the same namespace (e.g. port-forward / ingress controller)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: juice-shop
      ports:
        - protocol: TCP
          port: 3000

  egress:
    # Allow DNS resolution (kube-system CoreDNS)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Allow outbound HTTPS (challenge webhook, npm registry if needed)
    - ports:
        - protocol: TCP
          port: 443
